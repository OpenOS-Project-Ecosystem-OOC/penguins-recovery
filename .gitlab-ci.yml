# Converted from GitHub Actions — penguins-recovery

stages:
  - secret-scan
  - test
  - sync
  - release

default:
  image: ubuntu:22.04

test:
  stage: test
  before_script:
    - apt-get update -qq && apt-get install -y shellcheck
  script:
    - |
      failed=0
      for f in $(find . -name "*.sh" ! -path "./.git/*"); do
        bash -n "$f" || { echo "FAIL syntax: $f"; failed=1; }
        shellcheck --severity=error "$f" || { echo "FAIL shellcheck: $f"; failed=1; }
      done
      exit $failed
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

bootloaders-upstream-sync:
  stage: sync
  before_script:
    - apt-get update -qq && apt-get install -y git ca-certificates
  script:
    - bash bootloaders/create-bootloaders || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

gitlab-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - echo "Creating release $CI_COMMIT_TAG"
  release:
    tag_name: '$CI_COMMIT_TAG'
    description: 'penguins-recovery $CI_COMMIT_TAG'
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'

secret-scan:
  stage: secret-scan
  image: python:3.12-slim
  before_script:
    - pip install git-filter-repo --quiet
  script:
    - |
      echo "Scanning commit history for leaked GitLab PATs..."
      git log --all -p | grep -E "glpat-[A-Za-z0-9_-]{20,}" && echo "LEAKED TOKEN DETECTED" && exit 1 || echo "No leaked tokens found."
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master)$/'
